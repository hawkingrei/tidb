name: Update Bazel Files
on:
  pull_request_target:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: update-bazel-files-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update:
    name: Update Bazel Files
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'OWNER'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.BAZEL_PREPARE_PUSH_TOKEN || github.token }}
          persist-credentials: false
      - name: Build Prepare
        uses: ./.github/actions/tidb_build
        with:
          bazelrc: ${{ secrets.BAZELRC }}
          go-version: 1.25
      - name: Run Bazel Prepare
        shell: bash
        run: |
          #!/bin/bash
          unset CI
          sed -i '/bazel-cache/d' DEPS.bzl
          sed -i '/ats.apps.svc/d' DEPS.bzl
          sed -i '/bazel-cache/d' WORKSPACE
          sed -i '/ats.apps.svc/d' WORKSPACE
          make bazel_prepare
      - name: Restore non-generated files
        shell: bash
        run: |
          git restore --worktree --source=HEAD -- WORKSPACE
      - name: Commit Bazel Files
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PUSH_TOKEN: ${{ secrets.BAZEL_PREPARE_PUSH_TOKEN || github.token }}
          TARGET_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          if git diff --quiet -- DEPS.bzl ':(glob)**/*.bazel' ':(glob)**/*.bzl'; then
            echo "No generated Bazel changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- DEPS.bzl ':(glob)**/*.bazel' ':(glob)**/*.bzl'
          git commit -m "chore: update bazel file"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${TARGET_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_REF}"
